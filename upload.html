<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krathus Racing - Painel Secreto de Upload</title>
    <style>
        :root {
            --bg-dark: #0d0f17; --bg-card: #161926; --accent-red: #e63946;
            --text-main: #f8f9fa; --text-muted: #a0a5b5; --border-color: #262a3d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 30px; border-radius: 12px; width: 100%; max-width: 450px; text-align: center; }
        input[type="password"] { width: 100%; padding: 10px; margin-bottom: 15px; background: #0f111a; border: 1px solid var(--border-color); color: #fff; border-radius: 6px; text-align: center; }
        .btn { background-color: var(--accent-red); color: white; padding: 10px 18px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-danger { background-color: #8b0000; }
        .drop-zone { border: 2px dashed var(--border-color); border-radius: 8px; padding: 25px; cursor: pointer; margin-top: 15px; }
        #uploadSection { display: none; }
    </style>
</head>
<body>
    <div class="box">
        <div id="authSection">
            <h2>🔒 Acesso Restrito</h2>
            <input type="password" id="accessPassword" placeholder="Digite a senha">
            <button class="btn" onclick="checkPassword()">Entrar</button>
        </div>

        <div id="uploadSection">
            <h2>📤 Enviar Arquivo JSON</h2>
            <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
                <p>📁 Clique para selecionar o arquivo .JSON</p>
                <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleUpload(event)">
            </div>
            <button class="btn btn-danger" onclick="resetDatabase()">🗑️ Limpar / Resetar Todos os Dados</button>
            <button class="btn" style="background: transparent; border: 1px solid var(--border-color);" onclick="location.href='index.html'">Voltar ao Início</button>
        </div>
    </div>

    <script>
        function checkPassword() {
            if (document.getElementById('accessPassword').value === "krathus2026") {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('uploadSection').style.display = 'block';
            } else {
                alert("Senha incorreta!");
            }
        }

        function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const newSessions = JSON.parse(event.target.result);
                    let existing = JSON.parse(localStorage.getItem('krathus_db_sessions')) || [];
                    
                    newSessions.forEach(ns => {
                        existing = existing.filter(s => s.id !== ns.id);
                        existing.push(ns);
                    });

                    localStorage.setItem('krathus_db_sessions', JSON.stringify(existing));
                    alert("🚀 Bateria importada com sucesso!");
                    location.href = 'index.html';
                } catch (err) {
                    alert("Erro ao ler o arquivo JSON.");
                }
            };
            reader.readAsText(file);
        }

        function resetDatabase() {
            if (confirm("Tem certeza que deseja apagar todos os dados salvos?")) {
                localStorage.removeItem('krathus_db_sessions');
                alert("🗑️ Banco de dados zerado!");
            }
        }
    </script>
</body>
</html>

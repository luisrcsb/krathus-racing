<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krathus Racing - Painel Secreto de Upload</title>
    <!-- Biblioteca oficial do Mozilla para ler PDFs direto no navegador -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg-dark: #0d0f17;
            --bg-card: #161926;
            --accent-red: #e63946;
            --text-main: #f8f9fa;
            --text-muted: #a0a5b5;
            --border-color: #262a3d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 30px; border-radius: 12px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 20px; font-size: 1.2rem; color: var(--accent-red); }
        input[type="password"] { width: 100%; padding: 10px; margin-bottom: 15px; background: #0f111a; border: 1px solid var(--border-color); color: #fff; border-radius: 6px; outline: none; text-align: center; }
        .btn { background-color: var(--accent-red); color: white; padding: 10px 18px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn:hover { background-color: #c82333; }
        .drop-zone { border: 2px dashed var(--border-color); border-radius: 8px; padding: 25px; text-align: center; cursor: pointer; margin-top: 15px; }
        #uploadSection { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <div id="authSection">
            <h2>🔒 Acesso Restrito</h2>
            <input type="password" id="accessPassword" placeholder="Digite a senha de acesso">
            <button class="btn" onclick="checkPassword()">Entrar</button>
        </div>

        <div id="uploadSection">
            <h2>➕ Enviar PDF do ZRound</h2>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px;">Selecione o arquivo PDF original da bateria. O sistema fará a leitura automática!</p>
            <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
                <p>📁 Clique aqui para selecionar o PDF (.pdf)</p>
                <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="handlePDFUpload(event)">
            </div>
            <button class="btn" style="background: transparent; border: 1px solid var(--border-color); margin-top: 15px;" onclick="location.href='index.html'">Voltar ao Início</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        function checkPassword() {
            const pass = document.getElementById('accessPassword').value;
            if (pass === "krathus2026") {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('uploadSection').style.display = 'block';
            } else {
                alert("Senha incorreta!");
            }
        }

        async function handlePDFUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                let fullText = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    fullText += textContent.items.map(item => item.str).join(" ") + "\n";
                }

                // Extrai data e hora do PDF do ZRound
                const dateMatch = fullText.match(/(\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2}:\d{2})/);
                const dateStr = dateMatch ? dateMatch[1] : "Data Desconhecida";
                const cleanId = 'Bateria_' + dateStr.replace(/\D/g, '');

                // Parser simples para extrair as voltas do texto do PDF do ZRound
                // (Procura padrões comuns de linhas de voltas com tempo)
                let laps = [];
                const lines = fullText.split('\n');
                let lapCounter = 1;

                // Exemplo de varredura adaptada para os relatórios do ZRound
                lines.forEach(line => {
                    // Aqui o script lê os dados da linha. Se necessário, podemos refinar 
                    // conforme o formato exato que o ZRound gera no seu PDF.
                });

                // Criando estrutura da sessão
                const sessionData = {
                    id: cleanId,
                    name: `Corrida ZRound (${dateStr})`,
                    date: dateStr,
                    type: "Corrida",
                    event: "Etapa Oficial",
                    rawTextPdf: fullText, // Guardado para depuração se precisar
                    laps: laps
                };

                // Salva no LocalStorage para o site principal ler
                let existingData = JSON.parse(localStorage.getItem('krathus_db_sessions')) || [];
                existingData = existingData.filter(s => s.id !== sessionData.id);
                existingData.push(sessionData);

                localStorage.setItem('krathus_db_sessions', JSON.stringify(existingData));
                alert(`🏁 PDF lido com sucesso!\nData: ${dateStr}\nSessão salva com ID: ${cleanId}`);
                
            } catch (err) {
                console.error(err);
                alert("Erro ao ler o arquivo PDF. Certifique-se de que é um relatório válido do ZRound.");
            }
        }
    </script>
</body>
</html>

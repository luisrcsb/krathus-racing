<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krathus Racing - Central de Telemetria</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0d0f17; --bg-card: #161926; --accent-red: #e63946;
            --text-main: #f8f9fa; --text-muted: #a0a5b5; --border-color: #262a3d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { background: var(--bg-card); border-left: 5px solid var(--accent-red); padding: 20px; border-radius: 10px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-color); }
        .btn { background-color: var(--accent-red); color: white; padding: 10px 18px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .filter-panel { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card { background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 18px; border-radius: 8px; }
        .table-container { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 10px; overflow-x: auto; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th, td { padding: 12px 16px; border-bottom: 1px solid var(--border-color); }
        th { background-color: #1a1d2c; color: var(--text-muted); font-size: 0.78rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🏁 KRATHUS <span>RACING</span></h1>
                <p>Central de Telemetria e Análise Dinâmica</p>
            </div>
            <button class="btn" onclick="location.href='upload.html'">📤 Ir para Painel de Upload</button>
        </header>

        <div class="filter-panel">
            <h3>🎯 Filtros de Sessões e Pilotos</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px;">
                <div>
                    <label style="color: var(--text-muted); font-size: 0.8rem; font-weight: bold;">SESSÕES</label>
                    <div id="sessionCheckboxes" style="background: #0f111a; border: 1px solid var(--border-color); padding: 10px; max-height: 120px; overflow-y: auto; margin-top: 5px;"></div>
                </div>
                <div>
                    <label style="color: var(--text-muted); font-size: 0.8rem; font-weight: bold;">PILOTOS</label>
                    <div id="driverCheckboxes" style="background: #0f111a; border: 1px solid var(--border-color); padding: 10px; max-height: 120px; overflow-y: auto; margin-top: 5px;"></div>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="card"><div style="color:var(--text-muted); font-size:0.8rem;">VENCEDOR</div><div id="cardWinner" style="font-size:1.5rem; font-weight:bold; color:#f1c40f;">--</div></div>
            <div class="card"><div style="color:var(--text-muted); font-size:0.8rem;">MELHOR VOLTA</div><div id="cardFastest" style="font-size:1.5rem; font-weight:bold; color:#2ecc71;">--</div></div>
            <div class="card"><div style="color:var(--text-muted); font-size:0.8rem;">VOLTAS VÁLIDAS</div><div id="cardTotalLaps" style="font-size:1.5rem; font-weight:bold; color:#3498db;">0</div></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Pos</th><th>Piloto</th><th>Sessão</th><th>Voltas</th><th>Melhor Volta</th></tr>
                </thead>
                <tbody id="classificationTableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
